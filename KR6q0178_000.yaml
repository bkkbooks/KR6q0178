body:
  text: 蘇州靈巖妙空佛海和尚注證道歌序余嘗覽吾家漁獵文字語言極多而騰耀古今膾炙人口者亦少至於永嘉著歌以證道慳於二千言往往乳兒竈婦亦能鑽仰此道爭誦遺章斷稿況在士夫衲子蟻慕雲駢不待云後諭由是觀之莫非宿植德本行解相應雖借舌端三昧遊戲人間世而脫身向佛祖外行履學者窮討其源大似持螺酌海執管窺天信夫西土謂之證道經名不誣矣余每念此一段佛事挂之牙頰間雖至造次未能忘羣才輩枯禪外單聞淺識摳衣問難遂延及此豈意小師德最從余之久日就月將編以成集一日出示求序於余將授諸來者余為之駭然良久詰曰一藏半藏皆為切腳以字八字翻成名邈達磨面壁不言如來無法可説昔永嘉已是剜肉作瘡詎可於瘡瘢上更加針芥耶子無乃販賣葛藤纍我乎答曰痛念佛法危如纍卵前輩凋謝後生無聞有愧丁寧提耳之勤如師所言皆大根上智一聞千悟不待鞭影而行者所能領解然鈍根末學必假筌蹄師既無言小子何述焉如是纍番推卸無何擬蛇畫足為虎插翅謾以第二機示之坐間適有梅知縣者棲神內典念茲在茲一見斯文感悟流涕出金縷板庶幾他日攜手同遊華嚴勝會亦豈小補哉因點筆為之引時紹興丙寅住靈巖去一叟知訥序靈巖妙空和尚注證道歌侍者德最集昔世尊於靈山拈一枝華迦葉微笑乃至吾有正法眼藏分付於汝謂之證也又永嘉大師本習天台止觀四威儀中常冥禪觀因詣曹溪六祖往復問答乃蒙印證祖留一宿時謂一宿覺遂作此歌以其所證之道述而書之故謂證道歌也
