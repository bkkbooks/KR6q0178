body:
  text: 參學弟子梅汝能施金命工鏤板君一字法門私按陀羅尼經云無有一切諸法是名一字法門見宗鏡錄二二十三紙也不見趨聲越色離見絕聞也如云見見之時見非是見見猶離見見不能及且道不見畢竟不見箇什麼絕學無為閒道人有無不學至於無學謂之絕學終日為而未甞為謂之無為行住坐臥透脫情塵名閒道人不除妄想不求真妄本是道不可言除真性本空豈容更覓雖然如是到此不求不除處更進一步始得無明實性即佛性真妄同源理事不二無明之性即是佛性不須捨妄別求佛性若離於妄即無佛性然佛性非有非無不有無若言佛性定可即者又何異土上加泥幻化空身即法身既知明即是佛性身隨智轉亦了現前幻化色身即是真空法身然上云不除妄亦不求真真妄皆不立又云無明實性即佛性幻化空身即法身蓋由真空湛然然雖不可求而常圓雖現前而了不可覓法身覺了無一物本源自性天真佛師恐人尚可了法身故重拈云法身覺了無一物也又云無一物者非謂去物蓋於物物當體即空故即無一物則觸處皆真無非是道故云本源自性天真佛五陰浮雲空去來三毒水泡空出沒五陰不實喻若浮雲雖於太虗去來而太虗之性本無動靜三毒非固端如虗泡雖於大海出沒而大海之水終無起滅故知幻妄色相自有生滅而法性天真本無變異也證實相無人法剎那滅却阿鼻業實際理事不受一塵人法既無業將誰受若將妄語誑眾生自招舌塵沙劫師恐後生難信故發弘誓頓覺了如來禪不歷位次一超直入故謂頓覺圓融具足無欠無餘謂如來禪六度萬行體中圓布施持戒忍辱精進禪定智慧名六度總為六度廣為萬行其實一心也故曰體中圓夢裡明明有六趣覺後空空無大千夢中萬事紛紜覺來豁然無一六趣大千皆是妄心變妄心是妄則諸世間無實義無罪福無損益寂滅性中莫問覓罪福本空故曰無此蓋身如幻夢罪福何加若虗空如何問覓比來塵鏡未曾磨今日分明須剖拆眾生不明心地如鏡上塵當求明師磨光刮垢誰無念誰無生若實無生無不生喚取機關木人問求佛施功早晚成師恐後生未覺落於斷見故設問云誰人無生若實證無生是故木人決不解語而執無生者必落斷滅而不成佛者明矣放四大莫把捉寂滅性中隨飲既不執無生則知四大本空逍遙自在而寂滅性清淨本然周徧法界終日著衣喫飯總在裏許復何物拘諸行無常一切空即是如來大圓覺四大不有萬行何施設有所為性本空寂如斯履踐何異如來決定說表真僧有人不肯任情徵師之得處真實故所說皆決定之說表真僧者堪以為僧中之標也而彼小根小乘聞說大乘不肯信受橫生難問則吾何歎哉直截根源佛所印摘葉尋枝我不能直下明心見性成佛此乃從上諸聖遞相印授若窮經討論摘葉尋枝則吾不能為也摩尼珠人不識如來藏裡親收得梵語摩尼珠此云無垢光即喻一真之性也如來藏性即第八識含藏識能生一切善惡種子悟之則聖迷之則凡而一切眾生具此一珠良由無始劫來因緣雜深故不能現而如來以性空智身含十方徧虗空界而此珠瑩然如淨瑠璃內含寶月雖然如此諸世間人各有一珠問諸人祇今在什麼處六般神用空不空一顆圓光色不色本是一精明分為六和合在眼曰見在耳曰聞在手執捉在足運奔悟之則為神用迷之則為六賊是以得道者六根門頭常了空寂當處出生隨處滅盡而本體圓光靈明廓徹不可顯示蓋不可以聲色求不可以有無會故曰空不空色不色淨五根得五力唯證乃知難可測肉天慧佛法謂之五眼信進念定慧謂之五力淨其五眼得其五力此乃大境界故當親證親悟然後乃知豈可於中妄加測度哉鏡裏看形見不難水中捉月爭拈得若以小根小乘測度如來圓覺境界則如鏡裏看影終非無見但非甚實又如眾猿水中認月而捉之終無實効也常獨行常獨步達者同遊涅槃路涅槃路即不生不滅之路也此云一路吾今得之獨行獨步高出世間唯達者同途而小根小乘以測度之心而能遊哉調古神清風自高貌顇骨剛人不顧祇為大高人難顧仰窮釋子口稱貧實是身貧道不貧喚作貧得麼貧則身常被縷褐道則心藏無價珍外緣雖缺內道實富誰能酬價無價珍用無盡利物應緣終不恡覿面相呈何曾蓋覆應用無盡何法之有三身四智體中圓八解六通心地印三身四智八解六通並是如來無心而證參玄士若能離念即同如來上士一決一切了中下多聞多不信上士聞道勤而行之中士聞道若存若亡下士聞道抃掌大笑但自懷中解垢衣誰能向外誇精進但自內滅情塵何假外誇精進從他謗任他非把火燒天徒自疲道火不燒口道水無涓滴誹謗甚處著我聞恰似飲甘露銷融頓入不思議麤言細語皆歸第一義觀惡言是功德此則成吾善知識達惡為善了逆則順觀茲惡言真善知識不因訕謗起怨親何表無生慈忍力毀譽不動是如來行宗亦通說亦通宗通說不通如日在雲中說通宗不通如蛇入竹筒定慧圓明不滯空定慧圓備事理圓融不落斷空名為不滯非但我今獨達了恒沙諸佛體皆同河沙諸佛歷代祖師與今所證曾無間然師子吼無畏說百獸聞之皆腦裂宗說皆通定慧兼濟如師子王出入無畏解行偏枯見處不明如諸小獸聞師子吼非以但伏遠避亦乃腦裂心摧香象奔波失却威天龍寂聽生欣悅香象喻小乘知解之人於此大乘未能證入乍聞真說怕怖慞惶猶如香象雖有威力一聞師子之音則回顧奔走莫知所措天龍乃喻大乘菩薩之人聞茲真說則寂然欣聽身心安樂也遊江海涉山川尋師訪道為參禪師自述尋訪之意也自從認得曹溪路了知生死不相關師蒙曹溪印可生死路頭了無滯行亦禪坐亦禪語默動靜體安然既無生死動靜一如左右逢源無不中的縱遇鋒刀常坦坦假饒毒藥也閑閑四大本空五陰非我毒藥鋒刀何所畏恨我師得見然燈佛多劫曾為忍辱仙此乃引釋迦昔為忍辱仙被歌利王所害曾無怨色蓋已無人無我故然燈佛與我授記此欲明師之所證亦如是幾回生幾回死此乃師感悟而自嘆之辭從來不悟涅槃已前虗生浪死莫知其劫數幾何生死悠悠無定止自從頓悟入無生於諸榮辱何憂喜內所主有不被物轉入深山住蘭若梵語蘭若此云無諍訟處岑崟幽邃長松下優游靜坐野僧家閴寂安居實蕭洒白雲為蓋流水作琴蕭洒出塵軒昂俗覺即了不施功一切有為法不同有作有為皆外邊走無功之功不在施焉住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得當來不如意望報行施名為住相得生天報未免淪墜如箭射空徒爾自困爭似無為實相門一超直入如來地實相門不假功行一念回光至如來地但得本莫愁末如淨瑠璃含寶月本立而道生本者心也心生則種種法生心滅則種種法滅如淨瑠璃含寶月內外瑩徹洞照十方則於物何凝滯哉我今解如意珠自利利他終不竭自未得度先度人者菩薩發心自覺已圓能覺他者如來應世此如意珠即摩尼珠是也唯如來藏中收得吾今既得同如來是故自利利他終不能盡今日解此一珠布施大眾還見麼江月照松風吹永夜清宵何所為莫作勝解是真境界佛性戒珠心地印霧露雲霞體上衣或謂佛性或謂戒珠其實皆一心也故謂之心地印而此心印無凝則身徧十方故知霧露雲霞皆體上之衣也降龍鉢解虎錫兩鈷金鐶鳴歷歷不是標形虗事持如來寶杖親蹤跡則鉢盂錫杖也昔如來以金錫降火龍外道稠禪師以錫解虎鬬皆因事立名此二物皆如來行化之具於入滅時遺掛樹上蓋留與後世子孫豈虗標形狀而謾事持不求真不斷妄了知二法空無相無相無空無不空即是如來真實相真妄不立了然無相無相則空存故亦須無空若無空則無所不空此即如來真實之相矣如金剛經云如來說一切諸相非相是名真相心鏡明鑑無罣礙廓然瑩徹周沙界萬象森羅影現中一顆圓光非內外心鏡明淨洞徹十方萬象森羅豈逃影豁達空撥因果漭漭蕩蕩招殃過沈空滯寂撥無因果不了法空而言悟空口常談空而著頑空如斯則與外道斷見無異參玄高士善用其心棄有著空病亦然還如避溺而投火棄有著空二皆大病捨妄心取真理取捨之心成巧偽真妄平等取捨一如如纔生疑心即成巧偽是以古德云截斷兩頭路歸家穩坐學人不了用修行真成認賊將為子晚學初心不了有無法勤苦修行求出三界正如認賊為子自劫家寶終不能成就損法財滅功德莫不由斯心意識無道之人須一心不生心如墻壁方可入道良由心生則種種法生心滅則種種法滅是以禪門了却心頓入無生知見力直下明心見性成佛大丈夫秉慧劍般若鋒兮金剛𦦨大夫丈乃勇猛之士也當秉智慧劍裂煩惱網般若鋒言其利也金剛燄取其堅也非但能摧外道心早曾落却天魔膽外道天魔聰明無慧聞此圓宗以心摧膽落震法雷擊法鼓布慈雲兮洒甘露圓宗一舉普利一切雷起蟄如鼓憐迷如雲普覆如雨普滋其利溥哉龍象蹴踏潤無邊三乘五性皆惺悟龍象乃最上乘之人聞此法雷沾此雨則廣潤無邊而三乘五性雖未能全獲勝利而亦知惺悟耳雪山肥膩更無雜純出醍醐我常納雪山有草名曰忍辱草曰肥膩牛若食之純出醍醐此喻圓宗無雜一性圓通一切性一法徧含一切法舉一性即攝一切性舉一法即統一而未甞少在一切而未甞多以由無剩法故一月普現一切水一切水月一月攝一月喻於一心一切水喻諸世間也唯心能現於一切處而終攝於一心也諸佛法身入我性我性還共如來合凡聖不二生佛靡殊只由我之真性與如來同故得法身入我性內一地具足一切地非色非心非行業圓宗一地具足諸地非是凡夫二乘色心行業之所能致彈指圓成八萬門剎那滅却三祇劫八萬法門彈指可成三大祇劫剎那可滅一切數句非數句與吾靈覺何交涉數乃法數句即言教此靈覺之性非法相言教可測亦非非法相言教可得不可毀不可讚體若虗空勿涯岸虗空無相毀讚何施不離當處常湛然覓則知君不可覩昭昭在心目之間而相不可覩晃晃於色塵之內而理不可分且道祇今在什麼處師良久云元來祇在這裏取不得捨不得不可得中只麼得道無彼此人自取捨但離分別即如如佛默時說說時默默時其聲如雷說時無口無舌大施門開無壅塞八字打開入門相見有人問我解何宗報道摩訶般若力摩訶梵語此云大多勝般若此云智慧我宗以無上般若為宗言力者以其能破一切塵勞也或是或非人不識逆行順行天莫測達道之士縱橫妙用無非佛事天尚不可測何況於人乎雖然如此也須實到此田地始得我早曾經多劫修不是等閒相誑惑然此等事誠非小緣吾今得之非一生一劫能修證蓋於多劫勤苦豈可等閒而相誑惑耶師恐後昆信根淺劣故說此辭建法幢立宗旨明明佛敕曹溪是自達磨西來相傳至曹溪六祖達磨云吾本來此土傳法救迷情一花開五葉結果自然成我此宗以心傳心不立文字教外別傳立此宗旨實非小緣若非承佛記莂安能如是第一迦葉首傳燈二十八代西天記佛於靈山會上以正法眼藏分付迦葉迦葉付阿難祖祖傳授以至二十八祖菩提達磨此西天記也歷江海入此土菩提達磨為初祖在西天則迦葉為初祖在此土則達磨為初祖也六代傳衣天下聞後人得道何窮數達磨初至此土而此土眾生信根尚淺故以衣表信至六祖則觀眾生根器已熟則止衣而不傳但以心相印授耳自此後得道者迨今洋洋焉可勝數真不立妄本空有無共遣不空空真妄有無皆對待法真若不立則妄何由生有無既遣則能遣之空亦遣故曰不空空二十空門元不著一性如來體自同二十空本出大般若經空只是一也為破二十種有故立二十空此空亦空性相雙融即與如來體性同也心是根法是塵兩種猶如鏡上痕心與法根與塵皆對待而生曾非實性於實性中有此二種如鏡上塵垢也痕垢盡除光始現心法雙亡性則真痕垢淨盡則鏡光無礙心法消亡則真性廓然此自然之理明矣嗟末法惡時世眾生薄福難調制入末法人多放逸也去聖遠兮邪見深魔強法弱多怨害去聖遙遠邪見轉深聞此圓宗多生憎疾達磨尚遭擊齒況今之世耶聞說如來頓教門恨不滅除令瓦碎棄本逐末執于事相聞說頓法即欲滅除作在心殃在身不須怨訴更尤人心毀正法身陷阿鼻自作自受豈從人得也欲得不招無間業莫謗如來正法輪殺父殺母求佛懺悔謗佛謗祖何處懺悔栴檀林無雜樹密森沈獅子住境靜林閒獨自遊走獸飛禽皆遠去栴檀乃西天之樹此云與樂此標生處荊棘竝無故喻大乘一真境界純一無雜獅子乃喻法中王也然此境界唯大法王之所居而於小乘不能栖泊故云走獸飛禽皆遠去也獅子兒眾隨後三歲便能大哮吼若是野干逐法王百年妖怪虗開口獅子之兒纔生三歲便能哮吼而野干異獸欲逐效之雖千百年但妖怪之聲小乘人積行累功縱經千萬劫終不能至無為地如來出世便云天上天下唯我獨尊而永嘉大師一宿曹溪又豈假長劫積行矣比喻大乘之人一念發真歸源則直入如來地而小乘人積行也圓頓教勿人情有疑不決直須爭當仁不讓有疑須辯不是山僧逞人我修行恐落斷常坑師不好辯貴在證人去於邪見勿落有無非不非是不是差之毫釐失千里是則龍女頓成佛非則善星生陷墜世人只知是非無主殊不知有真是真非也故法華經云智積問文殊仁者往龍宮說法化人幾何文殊曰有娑竭羅龍王一女年八歲智慧利根能至菩薩忽然之間眾會皆見此女化成男子具菩薩行即往南方世界坐寶蓮華成等正覺楞嚴經云瑠璃大王善星比丘瑠璃為誅瞿曇種姓善星妄說一切法空生身陷入阿鼻地獄罪福立見是非昭然豈可顢頇佛性儱侗真如吾早年來積學問亦曾討疏尋經論師初學天台經分別名相不知休入海算沙徒自困却被如來苦訶責數他珍寶有何益不明本心徒勞分別滯於文字之中從來蹭蹬覺虗行多年枉作風塵客背覺合塵自可悲嘆種性邪錯知解不達如來圓頓制不忌真空生情解二乘精進無道心外道聰明無智慧二乘之人精進修行無度他行外道最聰明而反執我見也亦愚癡亦小騃空拳指上生實解凡夫無知錯認方便執指為月枉施功根境法中虗揑怪修多羅教如標月指既見月已了知所指必竟非月若更執指以為月體此得非無智者耶不見一法則如來方得名為觀自在凡夫執相為有聲聞說畢竟空菩薩當體即空若見有所見則為凡夫見無所見猶在半途若見物之時了無所見無所見見亦無見不捨一切法不即一切法是法住法位世間相常住方得自在了則業性本來空未了還須償宿債了無所見則罪福本空未達性空因果歷然飢逢王饍不能飡病遇醫王爭得瘥師勸學者今生幸值正宗直須徹去或進或退信不信譬臨飢待食王者賜饌而不飡抱病尋醫醫王與藥而不受則飢何由飽病何由蘇耶在欲行禪知見力火中生蓮終不壞不見可欲便心不亂此正小乘根器見其可欲而心不亂此則沒量大人如火內生蓮也勇施犯重悟無生早時成佛于今在其勇施比丘本美丈夫故僧相殊特因乞食至長者家其女見而慕之思不已成病將死母鍾愛苦遂以計誘比丘曰吾女欲聽經法我師可頻至授之辭至再三比丘不得已從命因成荏冉女雖病平女之夫知欲殺其妻比丘聞而不敢往女既懼夫殺又懷想比丘遂致毒於夫夫死比丘聞之大悔且曰致是淫殺良由我也若死墮阿鼻如箭雖三事衣不敢著掛於錫上勵聲唱言我犯根本重罪誰為我懺至一精舍遇鼻鞠多羅尊者警之曰推罪性了不可得遂說偈云諸法同鏡像亦如水中月凡夫愚惑心分別癡恚愛比丘豁然大悟應時十號具足往西方世界成等正覺號寶月如來既得無生則知非滅故曰于今在獅子吼無畏說深嗟懞懂頑皮靼音哲我為法王於法自在如獅子吼一切無畏小乘可嗟專執持犯而自拘繫懵懂乃昏鈍也靼乃牛領上極麤皮也只知犯重障菩提不見如來開秘訣頭在下文有二比丘犯婬殺波離螢光增罪結維摩大士頓除疑還同赫日銷霜雪有二比丘結菴山中修行偶一比丘出一比丘菴中睡熟樵女乘睡竊婬之比丘寤心不悅失聲大呼會同菴師疾趁樵女女因墮崖而死二比丘相謂曰一犯婬一犯殺雖各無心佛弟子恥不問佛遂詣優波離求懺波離持戒者結二人罪會維摩詰至謂言無重增二比丘罪當直除滅勿擾其心所以者何彼罪性不在內不在外不在中間如佛所說故知小乘如螢光大乘如赫日罪性本空猶如曉氷春雪也不思議解脫力妙用恒沙也無極此解脫之力不可以智測不可以情識大用現前窮劫莫盡四事供養敢辭勞萬兩黃金亦銷得心珠無價自利利他世寶縱多難酬重施粉骨碎身未足酬一句了然超百億恩大難酬法中王最高勝河沙諸佛同共證楞嚴經云過去諸如來斯門已成就現在諸菩薩今各入圓通未來修學人當依如是法我今解此如意珠信受之者皆相應人人具足各各圓成祇為離家日久不敢信受猶如窮子背父不認家珍了了見無一物亦無人亦無佛凡聖情盡物我兩亡大千沙界海中漚一切聖賢如電拂楞嚴經云一人發真歸源此十方空悉皆消殞況諸法界在虗空耶又云空生大覺中如海一漚發世界不實賢聖豈真掣電浮漚皆幻相耳假使鐵輪頂上旋定慧圓明終不失祇為信得及作得主日可冷月可熱眾魔不能壞真說是真難滅是假易除象駕崢嶸謾進途誰見螗螂能拒轍此結上句義言大乘菩薩處於世間如大象之車進於通途彼眾魔欲生阻壞如蟷螂怒臂以當車轍徒自取滅耳大象不遊於兔徑大悟不拘於小節大乘上士於法自在豈忉忉於時地哉而彼小乘所證之果端如兔徑非大象所遊地莫將管見謗蒼蒼未了吾今為君決蒼蒼其天正色握管窺其天耶此道不可以思惟知不可以思度會豈可以小根小器測度如來大圓覺境界終無有是處如以管窺天彼器自小天何私哉安可言天之小耶吾今所決者蓋為眾生未了故然雖如是永嘉不免老婆心切若遇靈巖棒故出後序余束髮從師以語孟發蒙求之訓釋語必宗陳用之孟必宗許允成二家雖文采道理或隱晦及觀舒王介甫訓釋則言簡而理足是知陳許欲人知者也舒王欲人思者也古之教者惟恐人之不思今之教者惟恐人之不知昔觀諸家解證道歌皆類陳許及觀靈巖老師訥公所注正如介甫異於陳許也此歌迺永嘉真覺禪師所述真覺本習止觀一日開大般若經豁然大悟遂往見六祖遶牀三帀振錫立祖呵之曰夫比丘者具三千威儀八萬細行大德從何方來生大我慢師云生死事大無常迅速祖曰何不體取無生了無速乎師云體即無生了本無速祖曰如是如是須臾辭歸祖云返太速乎師云本非動靜豈有速耶祖曰誰知非動靜師云仁者自生分別祖曰汝甚得無生意也師云無生豈有意祖曰若非意誰生分別師曰分別亦非意祖曰善哉善哉舉此真覺所造可知矣遂留一宿作此歌以證道盛行於世後有梵僧傳歸西天謂之證道經人人受持如中國之持金剛經也余晚年栖心此道甚切偶其徒最公慧然見訪出示斯文開味三反不覺渙然水釋精爽飛越得其旨趣雖去永嘉百餘年如與同席語豈非靈巖老師致我至是耶大似臨濟參黃檗三遭毒手初未知痛痒及指見大愚知老婆心切便道佛法無多子再參黃檗檗知其故遂語之曰安得業風吹大愚至與爛打一頓言猶未已反遭臨濟一掌余若到靈巖不免亦效臨濟之作且如靈巖面皮濶千丈厚百尺諸仁還敢下手麼若諦當分明便與一掌紹興丙寅孟朔參學弟子右修職郎特差蘇州南嶽梅汝能謹序
